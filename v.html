<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>💖</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      height: 100vh;
      background: url("t1.png") no-repeat center center fixed;
      background-size: cover;
      font-family: 'Poppins', sans-serif;
      color: #fff;
      text-align: center;
      overflow-x: hidden;
    }

    /* Title Glow */
    h1 {
      font-size: 55px;
      margin-top: 60px;
      text-shadow: 0 0 15px #ff4081, 0 0 30px #ff80ab;
      animation: glow 2s ease-in-out infinite alternate;
    }
    @keyframes glow {
      from { text-shadow: 0 0 10px #ff80ab; }
      to { text-shadow: 0 0 30px #ff4081, 0 0 50px #ff80ab; }
    }

    /* Timeline Box */
    .timeline {
      margin: 50px auto;
      padding: 20px;
      width: 70%;
      background: rgba(0,0,0,0.5);
      border-radius: 20px;
      font-size: 20px;
      line-height: 2;
      text-align: left;
      box-shadow: 0 4px 15px rgba(0,0,0,0.7);
    }

    /* Falling Hearts */
    .heart {
      position: fixed;
      top: -10%;
      color: #ff80ab;
      font-size: 25px;
      animation: fall 6s linear infinite;
    }
    @keyframes fall {
      to { transform: translateY(110vh) rotate(360deg); opacity: 0; }
    }
  </style>
</head>
<body>

  <!-- Background Song -->
  <audio autoplay loop>
    <source src="neeyum_naanum.mp3" type="audio/mpeg">
  </audio>

  <!-- Heading -->
  <h1> I found a mannnnn!!💕</h1>

 
  <!-- Falling Hearts Script -->
  <script>
    function createHeart() {
      const heart = document.createElement("div");
      heart.classList.add("heart");
      heart.innerHTML = "💖";
      heart.style.left = Math.random() * 100 + "vw";
      heart.style.fontSize = Math.random() * 20 + 15 + "px";
      heart.style.animationDuration = (Math.random() * 3 + 3) + "s";
      document.body.appendChild(heart);

      setTimeout(() => { heart.remove(); }, 6000);
    }
    setInterval(createHeart, 500);
  </script>

<video width="600" controls autoplay loop muted style="border-radius:15px; box-shadow:0 4px 15px rgba(0,0,0,0.6);">
  <source src="tamilv.mp4" type="video/mp4">
  Your browser does not support the video tag.
</video>
<div style="text-align:center; margin:40px 0;">

  <a href="tamilar.html" class="next-btn">
     <span>click to see my thoughts through words➜</span>
  </a>

</div>

<style>
.next-btn{
    display:inline-flex;
    align-items:center;
    gap:10px;
    padding:14px 32px;
    font-size:20px;
    font-weight:bold;
    color:#fff;
    text-decoration:none;
    border-radius:50px;
    background:linear-gradient(45deg,#ff4b5c,#ff8c42);
    box-shadow:0 8px 20px rgba(255,75,92,0.4);
    transition:all 0.35s ease;
    animation:float 2s ease-in-out infinite;
}

.next-btn span{
    transition:transform 0.35s ease;
}

.next-btn:hover{
    transform:translateY(-5px) scale(1.08);
    box-shadow:0 12px 28px rgba(255,75,92,0.6);
}

.next-btn:hover span{
    transform:translateX(8px);
}

.next-btn:active{
    transform:scale(0.96);
}

@keyframes float{
    0%{transform:translateY(0);}
    50%{transform:translateY(-6px);}
    100%{transform:translateY(0);}
}
</style>
</div>

</body>
</html>
